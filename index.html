<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>TASKD — Your Task Manager</title>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=Syne:wght@700;800&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --bg:       #0a0a0a;
      --surface:  #111111;
      --border:   #222222;
      --accent:   #00ff88;
      --accent2:  #ff3f3f;
      --accent3:  #ffd700;
      --text:     #e8e8e8;
      --muted:    #555555;
      --done:     #2a2a2a;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'IBM Plex Mono', monospace;
      min-height: 100vh;
      padding: 0;
      overflow-x: hidden;
    }

    /* Scanline overlay */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 2px,
        rgba(0,0,0,0.08) 2px,
        rgba(0,0,0,0.08) 4px
      );
      pointer-events: none;
      z-index: 999;
    }

    /* ── Header ── */
    header {
      border-bottom: 1px solid var(--border);
      padding: 24px 40px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      animation: fadeDown 0.5s ease both;
    }

    .logo {
      font-family: 'Syne', sans-serif;
      font-size: 28px;
      font-weight: 800;
      letter-spacing: -1px;
      color: var(--accent);
      text-shadow: 0 0 20px rgba(0,255,136,0.4);
    }

    .logo span { color: var(--text); }

    .status-bar {
      display: flex;
      gap: 24px;
      font-size: 11px;
      color: var(--muted);
    }

    .stat { display: flex; flex-direction: column; align-items: flex-end; gap: 2px; }
    .stat-val { font-size: 20px; font-weight: 600; color: var(--text); }
    .stat-val.green { color: var(--accent); }
    .stat-val.red   { color: var(--accent2); }

    /* ── Main Layout ── */
    main {
      max-width: 900px;
      margin: 0 auto;
      padding: 40px 24px 80px;
    }

    /* ── Input Bar ── */
    .input-section {
      margin-bottom: 40px;
      animation: fadeDown 0.5s 0.1s ease both;
    }

    .input-label {
      font-size: 10px;
      letter-spacing: 3px;
      color: var(--muted);
      text-transform: uppercase;
      margin-bottom: 10px;
    }

    .input-row {
      display: flex;
      gap: 0;
      border: 1px solid var(--border);
      background: var(--surface);
      transition: border-color 0.2s;
    }

    .input-row:focus-within {
      border-color: var(--accent);
      box-shadow: 0 0 0 1px var(--accent), 0 0 20px rgba(0,255,136,0.08);
    }

    .input-prefix {
      padding: 14px 16px;
      color: var(--accent);
      font-size: 14px;
      border-right: 1px solid var(--border);
      user-select: none;
    }

    .task-input {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      color: var(--text);
      font-family: 'IBM Plex Mono', monospace;
      font-size: 14px;
      padding: 14px 16px;
    }

    .task-input::placeholder { color: var(--muted); }

    .priority-select {
      background: transparent;
      border: none;
      border-left: 1px solid var(--border);
      color: var(--muted);
      font-family: 'IBM Plex Mono', monospace;
      font-size: 12px;
      padding: 14px 12px;
      outline: none;
      cursor: pointer;
    }

    .priority-select option { background: #111; }

    .add-btn {
      background: var(--accent);
      color: #000;
      border: none;
      padding: 14px 24px;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      letter-spacing: 1px;
      transition: all 0.15s;
    }

    .add-btn:hover {
      background: #00ffaa;
      box-shadow: 0 0 20px rgba(0,255,136,0.4);
    }

    .add-btn:active { transform: scale(0.98); }

    /* ── Filter Tabs ── */
    .filters {
      display: flex;
      gap: 0;
      margin-bottom: 24px;
      border-bottom: 1px solid var(--border);
      animation: fadeDown 0.5s 0.2s ease both;
    }

    .filter-btn {
      background: none;
      border: none;
      border-bottom: 2px solid transparent;
      color: var(--muted);
      font-family: 'IBM Plex Mono', monospace;
      font-size: 11px;
      letter-spacing: 2px;
      text-transform: uppercase;
      padding: 10px 20px;
      cursor: pointer;
      margin-bottom: -1px;
      transition: all 0.2s;
    }

    .filter-btn:hover { color: var(--text); }

    .filter-btn.active {
      color: var(--accent);
      border-bottom-color: var(--accent);
    }

    /* ── Task List ── */
    .task-list {
      display: flex;
      flex-direction: column;
      gap: 2px;
      animation: fadeDown 0.5s 0.3s ease both;
    }

    .task-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px 16px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-left: 3px solid transparent;
      transition: all 0.2s;
      animation: slideIn 0.25s ease both;
      cursor: default;
    }

    .task-item:hover { border-color: #333; background: #161616; }

    .task-item.priority-high  { border-left-color: var(--accent2); }
    .task-item.priority-med   { border-left-color: var(--accent3); }
    .task-item.priority-low   { border-left-color: var(--accent); }

    .task-item.done {
      background: var(--done);
      border-left-color: var(--muted) !important;
      opacity: 0.5;
    }

    /* Checkbox */
    .check-wrap {
      width: 20px;
      height: 20px;
      flex-shrink: 0;
      position: relative;
      cursor: pointer;
    }

    .check-wrap input { display: none; }

    .check-box {
      width: 20px;
      height: 20px;
      border: 1px solid var(--muted);
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.15s;
      font-size: 12px;
    }

    .check-wrap:hover .check-box { border-color: var(--accent); }
    .check-wrap input:checked + .check-box {
      background: var(--accent);
      border-color: var(--accent);
      color: #000;
    }

    .task-text {
      flex: 1;
      font-size: 13px;
      line-height: 1.4;
      transition: all 0.2s;
    }

    .done .task-text {
      text-decoration: line-through;
      color: var(--muted);
    }

    .task-meta {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .priority-badge {
      font-size: 9px;
      letter-spacing: 2px;
      text-transform: uppercase;
      padding: 3px 8px;
      border: 1px solid;
    }

    .priority-badge.high  { color: var(--accent2); border-color: var(--accent2); }
    .priority-badge.med   { color: var(--accent3); border-color: var(--accent3); }
    .priority-badge.low   { color: var(--accent);  border-color: var(--accent);  }

    .task-time {
      font-size: 10px;
      color: var(--muted);
      min-width: 60px;
      text-align: right;
    }

    .del-btn {
      background: none;
      border: none;
      color: var(--muted);
      font-size: 16px;
      cursor: pointer;
      padding: 0 4px;
      line-height: 1;
      transition: color 0.15s;
      font-family: monospace;
    }

    .del-btn:hover { color: var(--accent2); }

    /* ── Empty State ── */
    .empty {
      text-align: center;
      padding: 80px 20px;
      color: var(--muted);
    }

    .empty-icon {
      font-size: 40px;
      margin-bottom: 16px;
      opacity: 0.3;
    }

    .empty p { font-size: 12px; letter-spacing: 2px; text-transform: uppercase; }

    /* ── Footer ── */
    footer {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      background: var(--bg);
      border-top: 1px solid var(--border);
      padding: 10px 40px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 10px;
      color: var(--muted);
      letter-spacing: 1px;
    }

    .footer-left { display: flex; gap: 24px; }

    /* ── Animations ── */
    @keyframes fadeDown {
      from { opacity: 0; transform: translateY(-10px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @keyframes slideIn {
      from { opacity: 0; transform: translateX(-8px); }
      to   { opacity: 1; transform: translateX(0); }
    }

    @keyframes strikeOut {
      to { opacity: 0.4; }
    }

    /* ── Scrollbar ── */
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: var(--bg); }
    ::-webkit-scrollbar-thumb { background: var(--border); }
  </style>
</head>
<body>

<header>
  <div class="logo">TASK<span>D</span></div>
  <div class="status-bar">
    <div class="stat">
      <span class="stat-val" id="stat-total">0</span>
      <span>TOTAL</span>
    </div>
    <div class="stat">
      <span class="stat-val green" id="stat-done">0</span>
      <span>DONE</span>
    </div>
    <div class="stat">
      <span class="stat-val red" id="stat-pending">0</span>
      <span>PENDING</span>
    </div>
  </div>
</header>

<main>
  <div class="input-section">
    <div class="input-label">// new task</div>
    <div class="input-row">
      <span class="input-prefix">❯</span>
      <input
        class="task-input"
        id="taskInput"
        type="text"
        placeholder="describe your task..."
        autocomplete="off"
      />
      <select class="priority-select" id="prioritySelect">
        <option value="high">HIGH</option>
        <option value="med" selected>MED</option>
        <option value="low">LOW</option>
      </select>
      <button class="add-btn" onclick="addTask()">+ ADD</button>
    </div>
  </div>

  <div class="filters">
    <button class="filter-btn active" data-filter="all"   onclick="setFilter('all',   this)">ALL</button>
    <button class="filter-btn"        data-filter="active" onclick="setFilter('active',this)">ACTIVE</button>
    <button class="filter-btn"        data-filter="done"   onclick="setFilter('done',  this)">DONE</button>
    <button class="filter-btn"        data-filter="high"   onclick="setFilter('high',  this)">HIGH PRIORITY</button>
  </div>

  <div class="task-list" id="taskList"></div>
</main>

<footer>
  <div class="footer-left">
    <span>TASKD v1.0.0</span>
    <span id="footer-time"></span>
  </div>
  <span>PRESS ENTER TO ADD TASK</span>
</footer>

<script>
  // ── State ──
  let tasks = JSON.parse(localStorage.getItem('taskd-tasks') || '[]');
  let filter = 'all';

  // ── Save ──
  function save() {
    localStorage.setItem('taskd-tasks', JSON.stringify(tasks));
  }

  // ── Add Task ──
  function addTask() {
    const input = document.getElementById('taskInput');
    const text = input.value.trim();
    if (!text) {
      input.focus();
      input.style.borderColor = 'red';
      setTimeout(() => input.style.borderColor = '', 400);
      return;
    }

    const task = {
      id: Date.now(),
      text,
      priority: document.getElementById('prioritySelect').value,
      done: false,
      createdAt: new Date().toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit' }),
    };

    tasks.unshift(task);
    save();
    input.value = '';
    render();
    input.focus();
  }

  // ── Toggle Done ──
  function toggleDone(id) {
    const task = tasks.find(t => t.id === id);
    if (task) { task.done = !task.done; save(); render(); }
  }

  // ── Delete ──
  function deleteTask(id) {
    tasks = tasks.filter(t => t.id !== id);
    save();
    render();
  }

  // ── Filter ──
  function setFilter(f, btn) {
    filter = f;
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    render();
  }

  function getFiltered() {
    switch (filter) {
      case 'active': return tasks.filter(t => !t.done);
      case 'done':   return tasks.filter(t => t.done);
      case 'high':   return tasks.filter(t => t.priority === 'high' && !t.done);
      default:       return tasks;
    }
  }

  // ── Render ──
  function render() {
    const list = document.getElementById('taskList');
    const filtered = getFiltered();

    // Stats
    const total   = tasks.length;
    const done    = tasks.filter(t => t.done).length;
    const pending = total - done;
    document.getElementById('stat-total').textContent   = total;
    document.getElementById('stat-done').textContent    = done;
    document.getElementById('stat-pending').textContent = pending;

    if (filtered.length === 0) {
      list.innerHTML = `
        <div class="empty">
          <div class="empty-icon">▣</div>
          <p>${filter === 'all' ? 'no tasks yet — add one above' : 'no ' + filter + ' tasks'}</p>
        </div>`;
      return;
    }

    list.innerHTML = filtered.map(task => `
      <div class="task-item priority-${task.priority} ${task.done ? 'done' : ''}" id="task-${task.id}">
        <label class="check-wrap" onclick="toggleDone(${task.id})">
          <input type="checkbox" ${task.done ? 'checked' : ''}/>
          <div class="check-box">${task.done ? '✓' : ''}</div>
        </label>
        <span class="task-text">${escHtml(task.text)}</span>
        <div class="task-meta">
          <span class="priority-badge ${task.priority}">${task.priority}</span>
          <span class="task-time">${task.createdAt}</span>
          <button class="del-btn" onclick="deleteTask(${task.id})" title="Delete">×</button>
        </div>
      </div>
    `).join('');
  }

  // ── Escape HTML ──
  function escHtml(str) {
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  // ── Footer clock ──
  function tick() {
    document.getElementById('footer-time').textContent =
      new Date().toLocaleTimeString('en-US', { hour12: false });
  }
  setInterval(tick, 1000);
  tick();

  // ── Keyboard shortcut ──
  document.getElementById('taskInput').addEventListener('keydown', e => {
    if (e.key === 'Enter') addTask();
  });

  // ── Init ──
  render();
</script>
</body>
</html>
