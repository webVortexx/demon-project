name: Deploy Task Manager

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── Job 1: Validate the HTML ──
  validate:
    name: Validate App
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check index.html exists
        run: |
          if [ ! -f index.html ]; then
            echo "❌ index.html not found!"
            exit 1
          fi
          echo "✅ index.html found"

      - name: Check HTML structure
        run: |
          grep -q "TASKD" index.html && echo "✅ App title found" || exit 1
          grep -q "addTask" index.html && echo "✅ JS logic found" || exit 1
          grep -q "localStorage" index.html && echo "✅ Storage found" || exit 1

  # ── Job 2: Deploy to GitHub Pages ──
  deploy:
    name: Deploy to GitHub Pages
    runs-on: ubuntu-latest
    needs: validate
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    permissions:
      contents: write
      pages: write
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./
          publish_branch: gh-pages
          exclude_assets: '.github,*.md'

      - name: Print deployment URL
        run: |
          echo "🚀 Deployed!"
          echo "🌐 URL: https://${{ github.repository_owner }}.github.io/demon-project"
